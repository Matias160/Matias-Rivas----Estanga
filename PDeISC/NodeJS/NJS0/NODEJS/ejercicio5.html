<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 5</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.contenedor {
    background-color: #ffffff;
    padding: 28px;
    border-radius: 14px;
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
    text-align: center;
    min-width: 230px;
}

h1 {
    margin: 0 0 18px 0;
    font-size: 28px;
    color: #1f2937;
}

table {
    width: 100%;
    border-collapse: collapse;
    overflow: hidden;
    border-radius: 10px;
}

th, td {
    padding: 12px;
    text-align: center;
    border: 1px solid #d1d5db;
}

th {
    background-color: #3b82f6;
    color: white;
    font-size: 18px;
}

td {
    background-color: #f9fafb;
    font-size: 20px;
    color: #111827;
}

tr:nth-child(even) td {
    background-color: #eef2ff;
}

tr:hover td {
    background-color: #dbeafe;
    transition: 0.2s;
}
</style>
</head>
<body>
<script type="module" src="./ejercicio5.js"></script>
</body>
</html>
