<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto 6 - Formulario</title>
    <link rel="stylesheet" href="Public/style.css">
</head>
<body>
    <h1>Proyecto 6 — Formulario de registro</h1>
    <div class="contenedor">
        <div class="formulario">
            <h2>Registrarse</h2>

            <label>Nombre:</label>
            <input type="text" id="nombre" placeholder="Tu nombre"/>

            <label>Email:</label>
            <input type="email" id="email" placeholder="correo@ejemplo.com"/>

            <label>Edad:</label>
            <input type="number" id="edad" min="1" max="120"/>

            <label>Género:</label>
            <div class="radio-grupo">
                <label><input type="radio" name="genero" value="Masculino"/> Masculino</label>
                <label><input type="radio" name="genero" value="Femenino"/> Femenino</label>
                <label><input type="radio" name="genero" value="Otro"/> Otro</label>
            </div>

            <label>País:</label>
            <select id="pais">
                <option value="">Seleccioná...</option>
                <option value="Argentina">Argentina</option>
                <option value="Uruguay">Uruguay</option>
                <option value="Chile">Chile</option>
                <option value="Brasil">Brasil</option>
            </select>

            <label>Intereses:</label>
            <div class="check-grupo">
                <label><input type="checkbox" value="Deportes"/> Deportes</label>
                <label><input type="checkbox" value="Música"/> Música</label>
                <label><input type="checkbox" value="Tecnología"/> Tecnología</label>
                <label><input type="checkbox" value="Arte"/> Arte</label>
            </div>

            <button onclick="registrar()">Registrarse</button>
        </div>

        <div id="resultado" class="resultado oculto">
            <h2>Datos registrados</h2>
            <div id="datos"></div>
        </div>
        <div id="error-message" style="display: none; padding: 10px; background: #fee2e2; border-radius: 6px; border: 1px solid #ef4444;"></div>
    </div>

    <script src="Public/script.js"></script>
</body>
</html>
